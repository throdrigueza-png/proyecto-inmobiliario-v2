# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions
#
# Monolithic deployment: FastAPI (Python) serves the built React frontend.
# The CI pipeline builds the React app first (output goes to backend/static/),
# then packages everything and deploys a single Azure App Service (Linux/Python).

name: Build and deploy monolithic app to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # ── Step 1: Build the React frontend ─────────────────────────────────
      # Vite outputs to backend/static/ so FastAPI can serve it directly.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend (outputs to backend/static/)
        working-directory: ./frontend
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: npm run build

      # ── Step 2: Set up Python and install dependencies ───────────────────
      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      # ── Step 3: Stage for deployment ─────────────────────────────────────
      # The artifact root must contain main.py, requirements.txt, etc.
      # directly (Azure App Service / Oryx expects this layout).
      # requirements.txt is explicitly copied to the deployment root so that
      # Azure App Service (Oryx) can detect and install dependencies on startup.
      - name: Stage files for deployment
        run: |
          mkdir -p /tmp/deploy
          rsync -av backend/ /tmp/deploy/
          cp backend/requirements.txt /tmp/deploy/requirements.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: /tmp/deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'api-inmo-sena-thomas'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
